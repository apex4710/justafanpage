<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Just A Fan - Social Hub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous">
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <script defer src="app.js"></script>
</head>

<body>

    <!-- Custom cursor -->
    <div id="cursor-dot"></div>
    <div id="cursor-trail"></div>

    <!-- Aurora background -->
    <div class="aurora" aria-hidden="true">
        <div class="aurora-band band-1"></div>
        <div class="aurora-band band-2"></div>
        <div class="aurora-band band-3"></div>
        <div class="aurora-band band-4"></div>
        <div class="aurora-band band-5"></div>
        <div class="aurora-band band-6"></div>
    </div>

    <!-- Dark Mode Toggle -->
    <label class="switch" aria-label="Toggle dark mode">
        <input type="checkbox" id="mode-toggle">
        <span class="slider">
            <i class="fa-solid fa-sun sun-icon"></i>
            <i class="fa-solid fa-moon moon-icon"></i>
        </span>
    </label>

    <!-- Main wrapper -->
    <main class="main-wrapper">

        <!-- Profile Section -->
        <section class="profile-section">
            <div class="avatar-ring">
                <div class="avatar-glow"></div>
                <img src="JAFlogo.png" alt="Just A Fan" class="profile-pic">
            </div>
            <h1 class="brand-name">Just A Fan</h1>
            <p class="brand-tagline">Believe In Believing</p>
        </section>

        <!-- Links Section -->
        <section class="links-section">
            <h2 class="section-label">Connect</h2>

            <div class="links-list">

                <!-- Twitter/X -->
                <a href="https://x.com/JustAFan1017" class="link-card twitter" data-app="twitter"
                    aria-label="Visit Just A Fan on Twitter">
                    <span class="card-accent"></span>
                    <span class="card-icon"><i class="fa-brands fa-x-twitter"></i></span>
                    <span class="card-name">X / Twitter</span>
                    <span class="card-arrow"><i class="fa-solid fa-arrow-right"></i></span>
                </a>

                <!-- Instagram -->
                <a href="https://www.instagram.com/justafanofficialig/" class="link-card instagram" data-app="instagram"
                    aria-label="Visit Just A Fan on Instagram">
                    <span class="card-accent"></span>
                    <span class="card-icon"><i class="fa-brands fa-instagram"></i></span>
                    <span class="card-name">Instagram</span>
                    <span class="card-arrow"><i class="fa-solid fa-arrow-right"></i></span>
                </a>

                <!-- YouTube -->
                <a href="https://www.youtube.com/@justafan1017" class="link-card youtube" data-app="youtube"
                    aria-label="Visit Just A Fan on YouTube">
                    <span class="card-accent"></span>
                    <span class="card-icon"><i class="fa-brands fa-youtube"></i></span>
                    <span class="card-name">YouTube</span>
                    <span class="card-arrow"><i class="fa-solid fa-arrow-right"></i></span>
                </a>

                <!-- TikTok -->
                <a href="https://www.tiktok.com/@justafan1017" class="link-card tiktok" data-app="tiktok"
                    aria-label="Visit Just A Fan on TikTok">
                    <span class="card-accent"></span>
                    <span class="card-icon"><i class="fa-brands fa-tiktok"></i></span>
                    <span class="card-name">TikTok</span>
                    <span class="card-arrow"><i class="fa-solid fa-arrow-right"></i></span>
                </a>

                <!-- Facebook -->
                <a href="https://www.facebook.com/justafan" class="link-card facebook" data-app="facebook"
                    aria-label="Visit Just A Fan on Facebook">
                    <span class="card-accent"></span>
                    <span class="card-icon"><i class="fa-brands fa-facebook-f"></i></span>
                    <span class="card-name">Facebook</span>
                    <span class="card-arrow"><i class="fa-solid fa-arrow-right"></i></span>
                </a>

                <!-- Threads -->
                <a href="https://www.threads.net/@justafanofficialig" class="link-card threads" data-app="threads"
                    aria-label="Visit Just A Fan on Threads">
                    <span class="card-accent"></span>
                    <span class="card-icon"><i class="fa-brands fa-threads"></i></span>
                    <span class="card-name">Threads</span>
                    <span class="card-arrow"><i class="fa-solid fa-arrow-right"></i></span>
                </a>

            </div>
        </section>

        <footer class="site-footer">
            <span>© 2025 Just A Fan</span>
        </footer>

    </main>
</body>

</html>
